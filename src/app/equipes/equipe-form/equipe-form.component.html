<div class="modal-overlay" (click)="onClose()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <button class="modal-close" (click)="onClose()">×</button>
    
    <div class="modal-header">
      <h2>{{ equipeEmEdicao() ? 'Editar Equipe' : 'Nova Equipe' }}</h2>
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="modal-body">
        @if (erro()) {
          <div class="error-message">
            {{ erro() }}
          </div>
        }

        <div class="form-group">
          <label for="nome">Nome da Equipe <span class="required">*</span></label>
          <input 
            type="text" 
            id="nome" 
            [ngModel]="nome()" 
            (ngModelChange)="nome.set($event)"
            name="nome"
            placeholder="Digite o nome da equipe"
            required
          >
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-cancelar" (click)="onClose()">
          Cancelar
        </button>
        <button type="submit" class="btn-salvar" [disabled]="salvando()">
          {{ salvando() ? 'Salvando...' : (equipeEmEdicao() ? 'Atualizar' : 'Salvar') }}
        </button>
      </div>
    </form>
  </div>
</div>
