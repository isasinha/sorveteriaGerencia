<div class="sidebar-layout">
  <aside class="sidebar">
    <nav class="sidebar-nav">
      <div class="sidebar-logo">
        <img src="logo_fundo_azul2.png" alt="Logo">
        <div class="sorveteria-banner">
          <span>SORVETERIA</span>
          <img src="logo_sorveteria_fundo_branco.png" alt="Logo Sorveteria">
        </div>
      </div>
      <ul class="nav-list">
        <li>
          <a routerLink="/dia-da-festa" routerLinkActive="active" class="nav-link">
            Dia da Festa
          </a>
        </li>
        <li>
          <a routerLink="/pessoas" routerLinkActive="active" class="nav-link">
            Pessoas
          </a>
        </li>
        <li>
          <a routerLink="/equipes" routerLinkActive="active" class="nav-link">
            Equipes
          </a>
        </li>
        <li>
          <a routerLink="/confirmacoes" routerLinkActive="active" class="nav-link">
            Confirmações
          </a>
        </li>
      </ul>

      <button class="logout-button" (click)="onLogout()">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        Sair
      </button>
    </nav>
  </aside>
  
  <main class="content">
    <ng-content></ng-content>
  </main>
</div>
